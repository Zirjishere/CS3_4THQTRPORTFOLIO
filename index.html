<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="My 4th Quarter Requirements landing page." />
  <meta name="theme-color" content="#8b5e3c" />
  <title>My 4th Quarter Requirements</title>
  <style>
    :root {
      --bg: #f3e7d3;
      --panel: #fff8ef;
      --brown: #6f4e37;
      --brown-dark: #4c3324;
      --brown-soft: #a67c52;
      --beige-line: #dcc9aa;
      --text: #2f241b;
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #f8efdf 0%, var(--bg) 55%, #ead8bd 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--beige-line);
      border-radius: 18px;
      padding: 30px 26px;
      box-shadow: 0 14px 32px rgba(76, 51, 36, 0.15);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      text-align: center;
      color: var(--brown-dark);
      letter-spacing: 0.4px;
    }

    .links {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: #fffaf3;
      background: linear-gradient(135deg, var(--brown-soft), var(--brown));
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid #8f6a47;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 8px 18px rgba(111, 78, 55, 0.2);
    }

    .links a:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #b4865b, #7d5638);
      box-shadow: 0 12px 24px rgba(111, 78, 55, 0.28);
    }

  </style>
</head>
<body>
  <main class="card">
    <h1>My 4th Quarter Requirements</h1>

    <ul class="links">
      <li>
        <a href="q41gRubidiumMENDARO.html">First Graded Excersises</a>
      </li>
    </ul>

  </main>
</body>
</html>
